<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .buttons {
        margin-top: 30px;
    }

    button.request {
        color: white;
        background-color: black;
        border: none;
        padding: 10px;
        width: 120px;
    }

    button.sign {
        color: white;
        background-color: #54a259;
        border: none;
        padding: 10px;
        border-radius: 5px;
        width: 90px;
        font-weight: bold;
    }

    button.add {
        color: black;
        background-color: #f9da4e;
        border: none;
        padding: 10px;
        border-radius: 20px;
        width: 170px;
        font-weight: bold;
    }

    button.get {
        color: white;
        background-color: #7354ad;
        border: none;
        padding: 10px;
        border-radius: 5px;
        width: 120px;
        font-weight: bold;
    }

    button.download {
        color: #a5a8a9;
        background-color: white;
        border-color: #a5a8a9;
        padding: 10px;
        border-radius: 5px;
        width: 110px;
        font-weight: bold;
    }

    button.apply {
        color: white;
        background-color: #2d65bc;
        border: none;
        padding: 10px;
        border-radius: 20px;
        width: 220px;
        font-weight: bold;
    }

    button.save {
        color: #4373c2;
        background-color: white;
        border-color: #4373c2;
        padding: 10px;
        border-radius: 20px;
        width: 80px;
        font-weight: bold;
    }
</style>

<body>
    <button class="request">Request now</button>
    <button class="sign">Sign up</button>
    <button class="add">Add to Cart</button>

    <div class="buttons">
        <button class="get">Get started</button>
        <button class="download">Download</button>
        <button class="apply">Apply on company website</button>
        <button class="save">Save</button>
    </div>

</body>

</html>
